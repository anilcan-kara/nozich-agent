name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Nozich — traces conversations, LLM calls, and tool usage. Opt-in via `nozich plugins enable observability/langfuse` or `nozich tools → Langfuse Observability`."
author: anilcan-kara
requires_env:
  - NOZICH_LANGFUSE_PUBLIC_KEY
  - NOZICH_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
